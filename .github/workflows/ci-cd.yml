name: StudyAI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: cd studyai/backend && pip install -r requirements.txt

      - name: Lint with ruff
        run: pip install ruff && ruff check studyai/backend/ --ignore E501

      - name: Type check
        run: pip install mypy && cd studyai/backend && mypy main.py --ignore-missing-imports

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        run: cd studyai/frontend && npm install && npm run build

  build-and-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t studyai-backend:${{ github.sha }} ./studyai/backend

      - name: Build frontend image
        run: docker build -t studyai-frontend:${{ github.sha }} ./studyai/frontend

      - name: Smoke test — compose up
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ALGORITHM: ${{ vars.JWT_ALGORITHM }}
          ACCESS_TOKEN_EXPIRE_MINUTES: ${{ vars.ACCESS_TOKEN_EXPIRE_MINUTES }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
        run: |
          cat > studyai/backend/.env <<EOF
          DATABASE_URL=${DATABASE_URL}
          JWT_SECRET=${JWT_SECRET}
          JWT_ALGORITHM=${JWT_ALGORITHM}
          ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
          GEMINI_API_KEY=${GEMINI_API_KEY}
          FRONTEND_URL=${FRONTEND_URL}
          EOF
          cd studyai && docker compose up -d backend
          sleep 15
          curl --fail http://localhost:8000/health || exit 1
          docker compose down

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Backend image: studyai-backend:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Frontend image: studyai-frontend:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Health check passed" >> $GITHUB_STEP_SUMMARY
